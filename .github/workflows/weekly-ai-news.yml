name: Weekly AI News Generator

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install OpenAI SDK for OpenRouter
        run: npm install openai

      - name: Generate weekly AI post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-weekly-post.js

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: añadir post semanal de IA (generado automáticamente)"
          file_pattern: |
            src/pages/posts/*.md
            public/images/*.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}