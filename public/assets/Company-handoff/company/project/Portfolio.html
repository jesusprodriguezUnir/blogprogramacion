// ─── BRAND TOKENS ─────────────────────────────────────────────────────────────

  "variant": "dark",
  "showBio": true,
  "compactMode": false
}/*EDITMODE-END*/;

const THEMES = {
  dark: {
    bg: "#0a0a10",
    surface: "#11111a",
    border: "#1e1e2e",
    text: "#e2e2ef",
    muted: "#6868aa",
    dim: "#3a3a5a",
  },
  slate: {
    bg: "#080c14",
    surface: "#0e1520",
    border: "#192033",
    text: "#dde6f5",

// ─── DATA ──────────────────────────────────────────────────────────────────────
const STACK = [
  { cat: "Backend",  items: [".NET Core 6–8", "C#", "DDD", "Mediator Pattern", "MVC"] },
  { cat: "Frontend", items: ["Angular 16–18", "HTML", "CSS", "JavaScript", "jQuery UI"] },

  { name: "DailyTask",        desc: "Gestión de tareas diarias con Python",              lang: "Python",   url: "https://github.com/jesusprodriguezUnir/DailyTask" },

const EXP = [
  { period: "2020 → now",  co: "UNIR",             role: "Tech Lead · Scrum Master",   note: ".NET Core, Angular, CI/CD, ERP Académico" },
  { period: "2010 → 2020", co: "SOTEC Consulting",  role: "Analista .NET",              note: "Banca, Oracle, migraciones .NET" },
  { period: "2003 → 2010", co: "Siemens · ABN AMRO · Bergé", role: "Analista Programador", note: "Emergencias, logística, banca" },

// ─── MICRO COMPONENTS ─────────────────────────────────────────────────────────
function Tag({ children, accent }) {
  return (
    <span style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 11,
      fontWeight: 500,
      letterSpacing: "0.04em",
      padding: "3px 9px",
      borderRadius: 3,
      background: accent.glow,
      color: accent.a1,
      border: `1px solid ${accent.a2}44`,
    }}>{children}</span>
  );
}

function Prompt({ accent }) {
  return <span style={{ color: accent.a1, fontFamily: "'JetBrains Mono', monospace", marginRight: 6 }}>$</span>;
}

function Comment({ children, theme }) {
  return (
    <span style={{ color: theme.muted, fontFamily: "'JetBrains Mono', monospace", fontSize: 13 }}>
      // {children}
    </span>
  );
}

function Divider({ theme }) {
  return <div style={{ height: 1, background: theme.border, margin: "48px 0" }} />;
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function Nav({ theme, accent, active }) {
  const links = ["inicio", "stack", "proyectos", "experiencia", "contacto"];
  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      borderBottom: `1px solid ${theme.border}`,
      background: `${theme.bg}ee`,
      backdropFilter: "blur(12px)",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 40px", height: 56,
    }}>
      <span style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 13, fontWeight: 600,
        color: accent.a1, letterSpacing: "0.08em",
      }}>
        jprc<span style={{ color: theme.muted }}>@dev</span>
      </span>
      <div style={{ display: "flex", gap: 32 }}>
        {links.map(l => (
          <a key={l} href={`#${l}`} style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 12, letterSpacing: "0.06em",
            textDecoration: "none",
            color: active === l ? accent.a1 : theme.muted,
            transition: "color 0.2s",
          }}>{l}</a>
        ))}
      </div>
    </nav>
  );
}

// ─── HERO ──────────────────────────────────────────────────────────────────────
function Hero({ theme, accent, showBio }) {
  const [typed, setTyped] = useState("");
  const full = "Tech Lead Full Stack";
  useEffect(() => {
    let i = 0;
    const t = setInterval(() => {
      setTyped(full.slice(0, ++i));
      if (i >= full.length) clearInterval(t);
    }, 60);
    return () => clearInterval(t);
  }, []);

  return (
    <section id="inicio" style={{ minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center", padding: "120px 40px 80px" }}>
      <div style={{ maxWidth: 860, margin: "0 auto", width: "100%" }}>
        <Comment theme={theme}>tech_lead · madrid · .net_core · angular</Comment>
        <h1 style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: "clamp(36px, 6vw, 72px)",
          fontWeight: 700,
          lineHeight: 1.1,
          margin: "20px 0 12px",
          letterSpacing: "-0.02em",
          color: theme.text,
        }}>
          Jesús Pedro<br />
          <span style={{ color: accent.a1 }}>Rodríguez Castro</span>
        </h1>
        <div style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: "clamp(16px, 2.2vw, 22px)",
          color: theme.muted,
          marginBottom: 32,
          minHeight: "1.4em",
        }}>
          <Prompt accent={accent} />{typed}<span style={{ animation: "blink 1s step-end infinite", color: accent.a1 }}>█</span>
        </div>

        {showBio && (
          <p style={{
            maxWidth: 560, lineHeight: 1.8, color: theme.muted,
            fontSize: 16, marginBottom: 40,
          }}>
            Scrum Master y Tech Lead especializado en .NET Core con más de 20 años de experiencia. Lidero equipos en UNIR construyendo soluciones robustas con arquitectura DDD, CI/CD y metodologías ágiles.
          </p>
        )}

        <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
          <a href="https://github.com/jesusprodriguezUnir" target="_blank" rel="noopener" style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 13, fontWeight: 600,
            padding: "10px 24px",
            background: accent.a1,
            color: theme.bg,
            borderRadius: 4,
            textDecoration: "none",
            letterSpacing: "0.04em",
          }}>github →</a>
          <a href="https://www.linkedin.com/in/jesús-pedro-rodríguez-castro-b746394a/" target="_blank" rel="noopener" style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 13,
            padding: "10px 24px",
            border: `1px solid ${theme.border}`,
            color: theme.muted,
            borderRadius: 4,
            textDecoration: "none",
            letterSpacing: "0.04em",
          }}>linkedin →</a>

            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 13,
            padding: "10px 24px",
            border: `1px solid ${theme.border}`,
            color: theme.muted,
            borderRadius: 4,
            textDecoration: "none",
            letterSpacing: "0.04em",
          }}>readme →</a>
        </div>

        <div style={{ marginTop: 80, display: "flex", gap: 48 }}>
          {[["20+", "años experiencia"], ["66", "repositorios"], [".NET", "especialización"]].map(([n, l]) => (
            <div key={n}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 28, fontWeight: 700, color: accent.a1 }}>{n}</div>
              <div style={{ fontSize: 12, color: theme.muted, letterSpacing: "0.06em", marginTop: 4 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <style>{`@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }`}</style>
    </section>
  );
}

// ─── STACK ────────────────────────────────────────────────────────────────────
function Stack({ theme, accent }) {
  return (
    <section id="stack" style={{ padding: "80px 40px", maxWidth: 860, margin: "0 auto" }}>
      <Comment theme={theme}>tech_stack.json</Comment>
      <h2 style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 700, marginTop: 12, marginBottom: 40, color: theme.text }}>
        Stack técnico
      </h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 20 }}>
        {STACK.map(({ cat, items }) => (
          <div key={cat} style={{
            background: theme.surface, border: `1px solid ${theme.border}`,
            borderRadius: 6, padding: "20px 24px",
          }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.1em", color: accent.a1, marginBottom: 14 }}>
              {cat.toUpperCase()}
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {items.map(i => <Tag key={i} accent={accent}>{i}</Tag>)}
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ─── PROJECTS ─────────────────────────────────────────────────────────────────
function Projects({ theme, accent }) {
  const [hov, setHov] = useState(null);
  return (
    <section id="proyectos" style={{ padding: "80px 40px", maxWidth: 860, margin: "0 auto" }}>
      <Comment theme={theme}>ls -la ~/repos</Comment>
      <h2 style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 700, marginTop: 12, marginBottom: 40, color: theme.text }}>
        Repositorios
      </h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16 }}>
        {REPOS.map((r, i) => (
          <a key={r.name} href={r.url} target="_blank" rel="noopener"
            onMouseEnter={() => setHov(i)} onMouseLeave={() => setHov(null)}
            style={{
              textDecoration: "none",
              display: "block",
              background: hov === i ? theme.surface : "transparent",
              border: `1px solid ${hov === i ? accent.a2 + "55" : theme.border}`,
              borderRadius: 6, padding: "20px 24px",
              transition: "all 0.18s",
            }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontWeight: 600, color: hov === i ? accent.a1 : theme.text }}>
                {r.name}
              </span>
              <Tag accent={accent}>{r.lang}</Tag>
            </div>
            <p style={{ fontSize: 13, color: theme.muted, lineHeight: 1.6 }}>{r.desc}</p>
          </a>
        ))}
      </div>
    </section>
  );
}

// ─── EXPERIENCE ───────────────────────────────────────────────────────────────
function Experience({ theme, accent }) {
  return (
    <section id="experiencia" style={{ padding: "80px 40px", maxWidth: 860, margin: "0 auto" }}>
      <Comment theme={theme}>cat experience.log</Comment>
      <h2 style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 700, marginTop: 12, marginBottom: 40, color: theme.text }}>
        Experiencia
      </h2>
      <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
        {EXP.map((e, i) => (
          <div key={i} style={{ display: "flex", gap: 32, paddingBottom: 40, position: "relative" }}>
            <div style={{ width: 140, flexShrink: 0 }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: accent.a1 }}>{e.period}</div>
            </div>
            <div style={{ flex: 1, borderLeft: `1px solid ${theme.border}`, paddingLeft: 32 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: accent.a1, position: "absolute", left: 136, top: 4 }} />
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 4 }}>{e.co}</div>
              <div style={{ fontSize: 13, color: accent.a1, marginBottom: 8 }}>{e.role}</div>
              <div style={{ fontSize: 13, color: theme.muted }}>{e.note}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Quote */}
      <div style={{
        marginTop: 20, padding: "24px 32px",
        background: theme.surface, border: `1px solid ${theme.border}`,
        borderLeft: `3px solid ${accent.a1}`,
        borderRadius: "0 6px 6px 0",
      }}>
        <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontStyle: "italic", color: theme.muted, lineHeight: 1.7 }}>
          "La mejor manera de predecir el futuro es construirlo"
        </p>
        <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: theme.dim, marginTop: 8 }}>— Alan Kay</p>
      </div>
    </section>
  );
}

// ─── CONTACT ──────────────────────────────────────────────────────────────────
function Contact({ theme, accent }) {
  return (
    <section id="contacto" style={{ padding: "80px 40px", maxWidth: 860, margin: "0 auto" }}>
      <Comment theme={theme}>echo "hablemos"</Comment>
      <h2 style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 700, marginTop: 12, marginBottom: 16, color: theme.text }}>
        Contacto
      </h2>
      <p style={{ color: theme.muted, marginBottom: 32, lineHeight: 1.7 }}>
        ¿Tienes un proyecto interesante o quieres hablar de tecnología?
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {[
          { label: "email", val: "jesusprodriguez@gmail.com", href: "mailto:jesusprodriguez@gmail.com" },
          { label: "github", val: "github.com/jesusprodriguezUnir", href: "https://github.com/jesusprodriguezUnir" },
          { label: "linkedin", val: "linkedin.com/in/jesús-pedro-rodríguez-castro", href: "https://www.linkedin.com/in/jesús-pedro-rodríguez-castro-b746394a/" },
        ].map(({ label, val, href }) => (
          <a key={label} href={href} target="_blank" rel="noopener" style={{
            display: "flex", alignItems: "center", gap: 16, textDecoration: "none",
            padding: "14px 20px",
            border: `1px solid ${theme.border}`,
            borderRadius: 6, background: "transparent",
            transition: "border-color 0.18s",
          }}
          onMouseEnter={e => e.currentTarget.style.borderColor = accent.a2}
          onMouseLeave={e => e.currentTarget.style.borderColor = theme.border}
          >
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: accent.a1, width: 60 }}>{label}</span>
            <span style={{ fontSize: 13, color: theme.muted }}>{val}</span>
          </a>
        ))}

// ─── BANNER TAB ───────────────────────────────────────────────────────────────
function BannerView({ theme, accent }) {
  return (
    <div style={{ padding: "60px 40px", maxWidth: 900, margin: "0 auto" }}>
      <Comment theme={theme}>github_banner.svg — 1500×500</Comment>
      <h2 style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 700, marginTop: 12, marginBottom: 8, color: theme.text }}>

      </h2>
      <p style={{ color: theme.muted, fontSize: 13, marginBottom: 32 }}>

// ─── DESIGN SYSTEM TAB ────────────────────────────────────────────────────────
function DesignSystemView({ theme, accent }) {
  const colors = [
    { name: "bg", val: theme.bg, label: "Background" },
    { name: "surface", val: theme.surface, label: "Surface" },
    { name: "border", val: theme.border, label: "Border" },
    { name: "text", val: theme.text, label: "Text" },
    { name: "muted", val: theme.muted, label: "Muted" },
    { name: "accent", val: accent.a1, label: "Accent" },
    { name: "accent2", val: accent.a2, label: "Accent dim" },
  ];

  return (
    <div style={{ padding: "60px 40px", maxWidth: 860, margin: "0 auto" }}>
      <Comment theme={theme}>design_system.tokens</Comment>
      <h2 style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 32, fontWeight: 700, marginTop: 12, marginBottom: 40, color: theme.text }}>
        Sistema de diseño
      </h2>

      {/* Colors */}
      <div style={{ marginBottom: 48 }}>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.1em", color: accent.a1, marginBottom: 20 }}>COLORES</div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          {colors.map(({ name, val, label }) => (
            <div key={name} style={{ textAlign: "center" }}>
              <div style={{ width: 64, height: 64, borderRadius: 6, background: val, border: `1px solid ${theme.border}`, marginBottom: 8 }} />
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: theme.muted }}>{label}</div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: theme.dim, marginTop: 2 }}>{val}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Typography */}
      <div style={{ marginBottom: 48 }}>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.1em", color: accent.a1, marginBottom: 20 }}>TIPOGRAFÍA</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 20, background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 8, padding: 28 }}>
          {[
            { label: "Display / Mono 72px", style: { fontFamily: "'JetBrains Mono', monospace", fontSize: 48, fontWeight: 700, color: theme.text } },
            { label: "Heading / Mono 32px", style: { fontFamily: "'JetBrains Mono', monospace", fontSize: 28, fontWeight: 600, color: theme.text } },
            { label: "Code / Mono 14px", style: { fontFamily: "'JetBrains Mono', monospace", fontSize: 14, color: accent.a1 } },
            { label: "Body / Inter 16px", style: { fontFamily: "'Inter', sans-serif", fontSize: 16, color: theme.muted, lineHeight: 1.7 } },
            { label: "Caption / Inter 12px", style: { fontFamily: "'Inter', sans-serif", fontSize: 12, color: theme.dim } },
          ].map(({ label, style }) => (
            <div key={label} style={{ borderBottom: `1px solid ${theme.border}`, paddingBottom: 16 }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: theme.dim, marginBottom: 8 }}>{label}</div>
              <div style={style}>Jesús Pedro Rodríguez Castro</div>
            </div>
          ))}
        </div>
      </div>

      {/* Components */}
      <div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.1em", color: accent.a1, marginBottom: 20 }}>COMPONENTES</div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center", background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 8, padding: 28 }}>
          <button style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 600, padding: "10px 24px", background: accent.a1, color: theme.bg, borderRadius: 4, border: "none", cursor: "pointer" }}>primary →</button>

    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const { tweaks: rawTweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const tweaks = rawTweaks || TWEAK_DEFAULTS;
  const [activeTab, setActiveTab] = useState("portfolio");

  const theme = THEMES[tweaks.variant] || THEMES.dark;
  const accent = ACCENTS[tweaks.accentColor] || ACCENTS.cyan;

  // Scroll tracking for nav
  const [activeSection, setActiveSection] = useState("inicio");
  useEffect(() => {
    const handler = () => {
      const ids = ["inicio", "stack", "proyectos", "experiencia", "contacto"];
      for (const id of [...ids].reverse()) {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top <= 80) { setActiveSection(id); break; }
      }
    };
    window.addEventListener("scroll", handler);
    return () => window.removeEventListener("scroll", handler);
  }, []);

  const tabStyle = (t) => ({
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: 12, padding: "6px 16px",
    borderRadius: "4px 4px 0 0",
    border: `1px solid ${activeTab === t ? theme.border : "transparent"}`,
    borderBottom: activeTab === t ? `1px solid ${theme.bg}` : `1px solid ${theme.border}`,
    background: activeTab === t ? theme.bg : "transparent",
    color: activeTab === t ? theme.text : theme.muted,
    cursor: "pointer", transition: "color 0.18s",
    marginBottom: -1,
  });

  return (
    <div style={{ background: theme.bg, minHeight: "100vh", color: theme.text, transition: "background 0.3s, color 0.3s" }}>
      {/* Tabs header */}
      <div style={{
        position: "fixed", top: 0, left: 0, right: 0, zIndex: 200,
        background: `${theme.bg}ee`, backdropFilter: "blur(12px)",
      }}>
        {/* Tab bar */}
        <div style={{ display: "flex", alignItems: "flex-end", padding: "8px 40px 0", borderBottom: `1px solid ${theme.border}`, gap: 4 }}>
          <button id="portfolio-tab" style={tabStyle("portfolio")} onClick={() => setActiveTab("portfolio")}>portfolio</button>
          <button id="readme-tab"    style={tabStyle("readme")}    onClick={() => setActiveTab("readme")}>readme.md</button>
          <button style={tabStyle("banner")}    onClick={() => setActiveTab("banner")}>banner</button>
          <button style={tabStyle("tokens")}    onClick={() => setActiveTab("tokens")}>design_system</button>
        </div>
        {/* Nav (only in portfolio tab) */}
        {activeTab === "portfolio" && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 40px", height: 44 }}>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 600, color: accent.a1, letterSpacing: "0.08em" }}>
              jprc<span style={{ color: theme.muted }}>@dev</span>
            </span>
            <div style={{ display: "flex", gap: 28 }}>
              {["inicio","stack","proyectos","experiencia","contacto"].map(l => (
                <a key={l} href={`#${l}`} style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.06em", textDecoration: "none", color: activeSection === l ? accent.a1 : theme.muted, transition: "color 0.18s" }}>{l}</a>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ paddingTop: activeTab === "portfolio" ? 100 : 52 }}>
        {activeTab === "portfolio" && (
          <>
            <Hero theme={theme} accent={accent} showBio={tweaks.showBio} />
            <div style={{ height: 1, background: theme.border, maxWidth: 860, margin: "0 auto" }} />
            <Stack theme={theme} accent={accent} />
            <div style={{ height: 1, background: theme.border, maxWidth: 860, margin: "0 auto" }} />
            <Projects theme={theme} accent={accent} />
            <div style={{ height: 1, background: theme.border, maxWidth: 860, margin: "0 auto" }} />
            <Experience theme={theme} accent={accent} />
            <div style={{ height: 1, background: theme.border, maxWidth: 860, margin: "0 auto" }} />
            <Contact theme={theme} accent={accent} />
            <div style={{ textAlign: "center", padding: "40px 0", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: theme.dim }}>
              // jesusprodriguezUnir · {new Date().getFullYear()}
            </div>
          </>
        )}
        {activeTab === "readme" && <ReadmeView theme={theme} accent={accent} />}
        {activeTab === "banner" && <BannerView theme={theme} accent={accent} />}
        {activeTab === "tokens" && <DesignSystemView theme={theme} accent={accent} />}
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection title="Acento">
          <TweakRadio id="accentColor" label="Color" options={["cyan","green","violet","amber"]} />
        </TweakSection>
        <TweakSection title="Fondo">
          <TweakRadio id="variant" label="Tema" options={["dark","slate","warm"]} />
        </TweakSection>
        <TweakSection title="Contenido">
          <TweakToggle id="showBio" label="Mostrar bio" />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
